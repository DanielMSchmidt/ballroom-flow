name: Deploy

on:
  push:
    branches: [development, main]

# One deploy at a time per branch; let a newer push cancel an in-flight one.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main -> production, development -> staging. Add protection rules and
    # scope CLOUDFLARE_API_TOKEN per environment in GitHub repo settings.
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Gate the deploy on the same checks as CI.
      - run: pnpm lint
      - run: pnpm -r typecheck
      - run: pnpm -r build
      - run: pnpm -r test

      - name: Resolve target environment
        id: target
        run: echo "name=${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}" >> "$GITHUB_OUTPUT"

      # Apply D1 schema migrations to the remote DB before deploying the code
      # that depends on them. No-op until Milestone 2 adds migrations.
      - name: Skip deploy notice (no Cloudflare token configured)
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "::notice::CLOUDFLARE_API_TOKEN not set for the '${{ steps.target.outputs.name }}' environment — skipping migrate + deploy. See PROVISIONING.md."

      # Apply D1 schema migrations to the remote DB before deploying the code
      # that depends on them. No-op until Milestone 2 adds migrations.
      - name: Apply D1 migrations
        if: env.CLOUDFLARE_API_TOKEN != ''
        working-directory: apps/worker
        run: pnpm exec wrangler d1 migrations apply DB --env ${{ steps.target.outputs.name }} --remote

      - name: Deploy Worker + assets
        if: env.CLOUDFLARE_API_TOKEN != ''
        working-directory: apps/worker
        run: pnpm exec wrangler deploy --env ${{ steps.target.outputs.name }}
