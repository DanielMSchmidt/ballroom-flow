name: Deploy

on:
  push:
    branches: [development, main]

# One deploy at a time per branch; let a newer push cancel an in-flight one.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main -> production, development -> staging. Add protection rules and
    # scope CLOUDFLARE_API_TOKEN per environment in GitHub repo settings.
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Gate the deploy on the same checks as CI.
      - run: pnpm lint
      - run: pnpm -r typecheck
      # The publishable key (public) is baked into the SPA at build time.
      # VITE_BUILD_ID (the commit SHA) is the stale-bundle handshake: the SPA
      # compares it against /api/health's buildId (injected into the worker at
      # deploy below — the SAME sha, since worker + assets ship as one deploy)
      # and reloads a tab left running an older bundle.
      # VITE_SENTRY_DSN (optional GitHub environment variable) bakes client-side
      # error reporting into the SPA (US-049 web half, apps/web/src/lib/ops.ts).
      # NOTE: VITE_CLERK_PUBLISHABLE_KEY and the worker's CLERK_* wrangler
      # secrets MUST belong to the SAME Clerk instance per environment — a
      # mismatch 401s every API call in that environment (2026-07-05 incident;
      # see PROVISIONING.md).
      - run: pnpm -r build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_BUILD_ID: ${{ github.sha }}
      - run: pnpm -r test

      # E2E smoke — the same @smoke Playwright gate CI runs on PRs, mirrored here
      # so a push to development/main can't deploy on a red journey. (deploy.yml
      # runs on push, which CI — pull_request only — never sees, so without this
      # a merge could ship a broken journey to staging. The full 3-device matrix
      # still runs nightly.)
      - name: Install Playwright (chromium)
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: E2E smoke (chromium)
        run: pnpm --filter web exec playwright test --project=chromium-desktop --grep @smoke
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Resolve target environment
        id: target
        run: echo "name=${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}" >> "$GITHUB_OUTPUT"

      # Apply D1 schema migrations to the remote DB before deploying the code
      # that depends on them. No-op until Milestone 2 adds migrations.
      - name: Skip deploy notice (no Cloudflare token configured)
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "::notice::CLOUDFLARE_API_TOKEN not set for the '${{ steps.target.outputs.name }}' environment — skipping migrate + deploy. See PROVISIONING.md."

      # Apply D1 schema migrations to the remote DB before deploying the code
      # that depends on them. No-op until Milestone 2 adds migrations.
      - name: Apply D1 migrations
        if: env.CLOUDFLARE_API_TOKEN != ''
        working-directory: apps/worker
        run: pnpm exec wrangler d1 migrations apply DB --env ${{ steps.target.outputs.name }} --remote

      # --var BUILD_ID: the worker half of the stale-bundle handshake (see the
      # build step above); /api/health surfaces it as `buildId`.
      - name: Deploy Worker + assets
        if: env.CLOUDFLARE_API_TOKEN != ''
        working-directory: apps/worker
        run: pnpm exec wrangler deploy --env ${{ steps.target.outputs.name }} --var BUILD_ID:${{ github.sha }}
