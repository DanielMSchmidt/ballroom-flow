name: Screenshot cleanup

# When a PR closes (merged or not), delete the screenshot-diff assets it left on
# the `ci-screenshots` prerelease, so the holding release doesn't grow without
# bound. Isolated in its own workflow so the `closed` trigger doesn't also fire
# ci.yml's fast-gate / full-e2e. See the `screenshots` job in ci.yml for how the
# assets get there (they are hosted on a release so the PR comment can inline the
# after/diff images WITHOUT any commit).
on:
  pull_request:
    types: [closed]

jobs:
  prune-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete this PR's screenshot release assets
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = 'ci-screenshots';
            let release;
            try {
              release = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data;
            } catch (e) {
              if (e.status === 404) return; // Nothing was ever published.
              throw e;
            }
            const prefix = `pr-${context.payload.pull_request.number}-`;
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner, repo, release_id: release.id, per_page: 100,
            });
            for (const a of assets) {
              if (a.name.startsWith(prefix)) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
              }
            }
