name: Nightly (full E2E + Lighthouse)

# The merge/nightly "full" gate from PLAN.md §10.3: the complete Playwright
# device matrix (chromium-desktop + mobile-chrome + mobile-safari) plus
# Lighthouse-CI. Scheduled nightly; also runnable on demand. Kept lightweight
# until the E2E suite + Lighthouse budgets exist (M9 / §7 perf NFRs).
on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC daily
  workflow_dispatch:

jobs:
  e2e-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      # All three device projects (chromium-desktop, mobile-chrome, mobile-safari).
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium webkit
      # The journeys run against a real worker (wrangler dev) the Playwright
      # webServer boots (apps/web/e2e/serve.sh). No --pass-with-no-tests: a real
      # journey failure now FAILS the nightly gate (#191).
      - name: E2E (full matrix)
        run: pnpm --filter web exec playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO (M9, PLAN.md §7): wire Lighthouse-CI against a preview of the built
      # PWA shell with budgets (shell interactive < ~2s, a11y AA). Stubbed so
      # the nightly job exists; flip on once perf budgets are authored.
      - run: echo "::notice::Lighthouse-CI not yet configured — see PLAN.md §7 / M9."
