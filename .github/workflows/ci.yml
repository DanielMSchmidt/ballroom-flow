name: CI

# Pushes to development/main are gated by the deploy workflow (which runs the
# same checks before deploying). CI covers pull requests with the layered
# "PR fast gate" from PLAN.md §10.3:
#   typecheck + lint → unit/property → contract+drift → worker/DO/D1 (incl.
#   EXPLAIN) → component + axe → E2E smoke.
# The full Playwright device matrix then runs as `full-e2e` — but ONLY after the
# fast gate passes (`needs: fast-gate`), so a broken PR fails fast/cheap and the
# expensive cross-browser matrix runs only when the fast checks are green. (This
# replaced the old scheduled nightly.yml, whose failures were silent for days.)
on:
  pull_request:
  workflow_dispatch:

jobs:
  # Landing-page screenshot comparison. Renders the marketing screenshots fresh
  # from THIS PR's code, pixel-diffs them against the `screenshots-baseline`
  # artifact from the last main run of screenshot-baseline.yml (what main's code
  # actually renders — the committed images stopped being refreshed when the
  # auto-commit bot was removed on 2026-07-14, so they drift stale; when no
  # artifact exists yet or it aged past retention, the diff falls back to the
  # committed images at the merge-base), and upserts a before/after PR comment.
  # It NEVER commits the rendered images back to the PR branch — that is the
  # deliberate change from the old screenshots.yml, whose bot commit carried
  # `[skip ci]` and became the PR HEAD with no CI on it (a red PR could then show no
  # failing checks on its HEAD). With no bot commit there is exactly one commit per
  # push, so fast-gate/full-e2e below always run on the PR's real HEAD.
  #
  # To inline before/after in the comment (a comment can only embed images it can
  # fetch by URL), the PNGs are published as assets on a dedicated `ci-screenshots`
  # prerelease and the comment links their `releases/download/...` URLs — hosting
  # them WITHOUT any commit (a release tag points at an existing commit; it adds no
  # history and never touches the PR). `contents: write` is needed to create the
  # release + upload assets; `actions: read` to fetch the baseline artifact. The
  # same PNGs are also kept as a run artifact. Stale
  # per-PR assets are pruned each push here, and on PR close by screenshot-cleanup.yml.
  # Informational only: this job does not gate the merge and runs independently of
  # fast-gate. Path-filtered at the step level so doc-only PRs skip the heavy work.
  screenshots:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Resolve the fork point for the relevance filter below and for the
      # committed-image FALLBACK baseline (used when no main-run artifact exists).
      # Note: with the artifact baseline the diff is PR-HEAD vs LATEST main — a PR
      # behind main can show changes that merged after its fork point; rebase to
      # narrow the diff to the PR's own changes. The base branch isn't fetched by
      # the head-ref checkout, so fetch it explicitly.
      - name: Resolve PR base
        id: base
        run: |
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"
          echo "sha=$(git merge-base HEAD "origin/${{ github.event.pull_request.base.ref }}")" >> "$GITHUB_OUTPUT"
      - name: Detect screenshot-relevant changes
        id: changes
        run: |
          if git diff --name-only "${{ steps.base.outputs.sha }}" HEAD \
             | grep -qE '^(apps/web/|apps/worker/|packages/|scripts/screenshot-diff\.mjs)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi
      # Fetch the diff baseline: the newest live `screenshots-baseline` artifact
      # rendered from main by screenshot-baseline.yml. When none exists (first
      # run, or all runs older than the artifact retention) the diff script falls
      # back to the committed images at the merge-base — so this step never fails
      # the job, it only decides which baseline the diff uses.
      - name: Fetch baseline screenshots (last main run)
        if: steps.changes.outputs.relevant == 'true'
        id: baseline
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner, repo, name: 'screenshots-baseline', per_page: 100,
            });
            const latest = artifacts
              .filter((a) => !a.expired && a.workflow_run && a.workflow_run.head_branch === 'main')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            if (!latest) {
              core.notice('No screenshots-baseline artifact from main found — diffing against the committed merge-base images instead.');
              core.setOutput('dir', '');
              core.setOutput('sha', '');
              return;
            }
            const dl = await github.rest.actions.downloadArtifact({
              owner, repo, artifact_id: latest.id, archive_format: 'zip',
            });
            fs.writeFileSync('screenshot-baseline.zip', Buffer.from(dl.data));
            core.setOutput('dir', 'screenshot-baseline');
            core.setOutput('sha', latest.workflow_run.head_sha);
      - name: Unpack baseline screenshots
        if: steps.changes.outputs.relevant == 'true' && steps.baseline.outputs.dir != ''
        run: unzip -q screenshot-baseline.zip -d screenshot-baseline
      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.relevant == 'true'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.relevant == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.changes.outputs.relevant == 'true'
      # Build the SPA + worker so the E2E harness (wrangler dev) can serve the app.
      - run: pnpm -r build
        if: steps.changes.outputs.relevant == 'true'
      - name: Install Playwright (chromium)
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm --filter web exec playwright install --with-deps chromium
      # Render into the workspace only — NOT committed (see the job comment above).
      - name: Render screenshots
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm --filter web screenshots
      - name: Build diff + comment
        if: steps.changes.outputs.relevant == 'true'
        env:
          # Namespace assets per PR + head SHA: pushes never collide and the changing
          # URL defeats GitHub's camo image cache. Uses the PR head SHA (the code that
          # was rendered), not github.sha (the merge commit).
          SCREENSHOT_ASSET_PREFIX: "pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-"
          SCREENSHOT_ASSET_URL_BASE: "${{ github.server_url }}/${{ github.repository }}/releases/download/ci-screenshots"
          # Baseline from the last main run (empty → committed merge-base fallback).
          SCREENSHOT_BASELINE_DIR: ${{ steps.baseline.outputs.dir }}
          SCREENSHOT_BASELINE_SHA: ${{ steps.baseline.outputs.sha }}
        run: |
          node scripts/screenshot-diff.mjs \
            "${{ steps.base.outputs.sha }}" \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Upload screenshot artifact (after images)
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshot-artifacts/
          if-no-files-found: ignore
          retention-days: 14
      # Host the before/after PNGs so the comment can inline them, WITHOUT a
      # commit: upload them as assets on the `ci-screenshots` prerelease. The
      # staged filenames already ARE the asset names (SCREENSHOT_ASSET_PREFIX +
      # key + ".before.png"/".after.png"), so we upload each file under its
      # basename and the URLs the comment computed match. Runs before the comment
      # upsert so the images exist
      # when the comment first renders (else camo may cache a 404). Stale assets from
      # this PR's earlier pushes are deleted first.
      - name: Publish screenshot images as release assets
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'screenshot-artifacts';
            const files = fs.existsSync(dir)
              ? fs.readdirSync(dir).filter((f) => f.endsWith('.png'))
              : [];
            if (files.length === 0) return;
            const { owner, repo } = context.repo;
            const tag = 'ci-screenshots';
            // Get-or-create the holding prerelease. A release tag points at an
            // existing commit — it adds no history and never touches the PR.
            let release;
            try {
              release = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data;
            } catch (e) {
              if (e.status !== 404) throw e;
              try {
                release = (await github.rest.repos.createRelease({
                  owner, repo, tag_name: tag, name: 'CI screenshots',
                  body: 'Holding release for PR screenshot-diff assets. Managed by CI; safe to ignore.',
                  prerelease: true,
                })).data;
              } catch (ce) {
                // Concurrent job won the create race (422 already_exists) — re-fetch.
                if (ce.status !== 422) throw ce;
                release = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data;
              }
            }
            // Prune stale assets from this PR's earlier pushes (different head SHA).
            // Paginate: many PRs share this one release, so >100 assets is possible.
            const prefix = `pr-${context.payload.pull_request.number}-`;
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner, repo, release_id: release.id, per_page: 100,
            });
            for (const a of assets) {
              if (a.name.startsWith(prefix)) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
              }
            }
            for (const name of files) {
              await github.rest.repos.uploadReleaseAsset({
                owner, repo, release_id: release.id, name,
                data: fs.readFileSync(path.join(dir, name)),
                headers: { 'content-type': 'image/png' },
              });
            }
      - name: Upsert PR comment
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('screenshot-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '<!-- screenshot-bot -->';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  fast-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # 1. Lint + typecheck. Typecheck IS the contract drift gate: the shared
      #    `typeof app` / doc-shape types fail `tsc` if the contract drifts.
      - name: Lint
        run: pnpm lint
      - name: Typecheck (+ contract drift)
        run: pnpm -r typecheck

      # 2. Unit / property (pure domain, in-memory Automerge + fast-check).
      #    Runs via `coverage` so the armed thresholds (vitest.config.ts) gate the
      #    PR — coverage can't silently regress.
      - name: Unit / property + coverage (domain)
        run: pnpm --filter @weavesteps/domain coverage

      # Build the SPA so the Worker's static-assets dir (apps/web/dist) and the
      # E2E preview server have something to serve.
      - name: Build
        run: pnpm -r build

      # 3. Worker / DO / D1 in real workerd (incl. the EXPLAIN QUERY PLAN gate
      #    once the test engineer wires expectIndexedQuery into a D1 test). Runs
      #    via `coverage` so the armed thresholds (vitest.config.ts) gate the PR.
      - name: Worker / DO / D1 + coverage (workerd)
        run: pnpm --filter worker coverage

      # 4. Component + axe (jsdom + Testing Library + vitest-axe).
      - name: Component + a11y (web)
        run: pnpm --filter web test

      # 5. E2E smoke — one fast Playwright pass against a REAL worker (wrangler
      #    dev, booted by the webServer in apps/web/e2e/serve.sh). The @smoke
      #    authoring journey gates here; chromium only, for speed. The full
      #    3-device matrix runs in `full-e2e` below once this gate is green. No
      #    --pass-with-no-tests: a real journey failure FAILS the PR gate (#191).
      - name: Install Playwright (chromium)
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: E2E smoke (chromium)
        run: pnpm --filter web exec playwright test --project=chromium-desktop --grep @smoke

  # Full Playwright device matrix (chromium-desktop + mobile-chrome +
  # mobile-safari) — the "full" gate from PLAN.md §10.3. Runs ONLY after
  # `fast-gate` succeeds (`needs`), so the expensive cross-browser pass is spent
  # only on PRs whose fast checks are already green. Replaces the scheduled
  # nightly: results now block the PR visibly instead of failing silently on a
  # cron nobody watches.
  #
  # The three device projects run as a MATRIX on parallel runners. The
  # `workers: 1` serialization in playwright.config.ts exists because all
  # journeys share one local D1 behind apps/web/e2e/serve.sh — but each runner
  # boots its own serve.sh (own D1 at apps/worker/.wrangler/e2e-state), so the
  # per-runner invariant holds while the projects run concurrently. Same tests,
  # same projects, ~half the wall time. Each leg installs only its own browser.
  full-e2e:
    needs: fast-gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium-desktop
            browser: chromium
          - project: mobile-chrome
            browser: chromium
          - project: mobile-safari
            browser: webkit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Install Playwright browser (${{ matrix.browser }})
        run: pnpm --filter web exec playwright install --with-deps ${{ matrix.browser }}
      # One device project per runner against a real worker (wrangler dev via
      # apps/web/e2e/serve.sh). No --pass-with-no-tests: any journey failure
      # fails the PR.
      #
      # Exclude the @video (explainer-video.spec.ts) and @screenshots
      # (screenshots.spec.ts) artifact recorders. They are chromium-only
      # GENERATORS, not assertion gates, and already run in their own dedicated
      # jobs (video.yml's `video:generate` and the `screenshots` job above, both
      # `--grep @video/@screenshots --project=chromium-desktop`). @video also
      # launches its OWN chromium internally, so it never exercised webkit — and
      # on the webkit leg (which now installs only webkit) chromium is absent, so
      # it can't run at all. Excluding them loses zero real coverage and trims
      # matrix time.
      - name: E2E (${{ matrix.project }})
        run: pnpm --filter web exec playwright test --project=${{ matrix.project }} --grep-invert "@video|@screenshots"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
