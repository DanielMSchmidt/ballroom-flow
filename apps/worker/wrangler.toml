name = "ballroom-flow"
main = "src/index.ts"
compatibility_date = "2025-09-06"
compatibility_flags = ["nodejs_compat"]

# D1: local tests use an in-memory SQLite (database_id is ignored locally).
# Replace database_id after `wrangler d1 create ballroom-flow` (see PROVISIONING.md).
[[d1_databases]]
binding = "DB"
database_name = "ballroom-flow"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# Serve the built SPA from the same Worker. API routes run worker-first;
# everything else falls back to index.html (client-side routing).
[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[env.staging]
[env.production]
