name = "weave-steps"
main = "src/index.ts"
compatibility_date = "2025-09-06"
compatibility_flags = ["nodejs_compat"]

# US-049 (M8): Smart Placement — the worker's hot path is D1 + DO round-trips,
# so let Cloudflare place it near the data instead of the client. Inherited by
# named environments (placement is not a binding), declared once here.
[placement]
mode = "smart"

# US-049 (M8): product metrics (Analytics Engine). writeMetric() no-ops when the
# binding is absent, so local dev without AE still runs. Bindings are NOT
# inherited by named environments — redeclared per env below.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "weave_steps_dev"

# Serve the built SPA from the same Worker. API routes run worker-first;
# everything else falls back to index.html (client-side routing).
[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# --- Default config: local `wrangler dev` + the vitest-pool-workers tests.
# Miniflare uses a local SQLite file and ignores database_id.
[[d1_databases]]
binding = "DB"
database_name = "weave-steps-dev"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# Per-document Automerge host (US-014, docs/system/architecture.md § Persistence
# & the DO lifecycle): one SQLite-backed DO per routine/figure document. The
# DocDO class is exported from src/index.ts.
[[durable_objects.bindings]]
name = "DOC_DO"
class_name = "DocDO"

# docs/ideas/annotation-media-embeds.md — the first binary storage: one R2 bucket
# per env for annotation media. Keys are media/<docRef>/<annotationId>/<mediaId>,
# so serving/upload authz derives from the key alone (the docRef in the prefix).
# Bindings are NOT inherited by named environments — redeclared per env below.
# Miniflare simulates this default binding for vitest + `wrangler dev`.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "weave-steps-media-dev"

# DO class migration — `new_sqlite_classes` because DocDO uses ctx.storage.sql
# (SQLite-backed). Top-level migrations apply to all environments.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DocDO"]

# --- E2E (#191): local-only environment Playwright runs against. Serves the
# E2E-built SPA (VITE_E2E=1) + the API + WS at one origin, with the FIXED test
# CLERK_JWT_KEY so our minted test JWTs verify networklessly (the same boundary
# the worker unit tests exercise), and E2E_TEST_ROUTES=1 to mount /api/test/*.
# NEVER deployed — `wrangler dev --env e2e` only. The PEM mirrors
# src/test-support/test-keys.ts (a committed throwaway test key).
#
# Serves from `dist-e2e`, the E2E-only build dir (see apps/web/e2e/serve.sh), NOT
# the deployable `dist` the staging/production envs ship. The E2E bundle carries
# the VITE_E2E=1 auth bypass, so keeping it out of `dist` is what stops it from
# ever reaching a real deploy.
[env.e2e]
name = "weave-steps-e2e"

[env.e2e.assets]
directory = "../web/dist-e2e"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[env.e2e.vars]
E2E_TEST_ROUTES = "1"
CLERK_JWT_KEY = """
-----BEGIN PUBLIC KEY-----
MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAuotPIYxUw/M786JWuF21
uTXQU/Ms1W2/xPbhQMomHib+DyPGr34H9K76tUwdzGvOQ+MKYRicvHH+7b6CNXZo
Jq40ezCeC7HE0ezWay0SjN9IW2G897b+9tx0LoJu5ELj4I7cyO7F6mP8SzYylgQh
SqL3ZYINQ1oAcxmvRqSki0YNqUGqdjlMVoVI1WyB9zPD6mr13DGaZI6osyt3MbC2
KA52WIUJMyi4ZqYEHlY8nQclD4TgQIKACqRA1UZdsuoEv3Aoa4oVT8hnzRqWvFJF
bSVofsrtGOIODLaticiTzdzsc+Q6obpYrayT8FfePj9f++Mc6dcomhCgurn8126N
dQIDAQAB
-----END PUBLIC KEY-----
"""

[[env.e2e.d1_databases]]
binding = "DB"
database_name = "weave-steps-e2e"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[env.e2e.durable_objects.bindings]]
name = "DOC_DO"
class_name = "DocDO"

# Media R2 bucket — Miniflare-simulated in the E2E harness (no real bucket).
[[env.e2e.r2_buckets]]
binding = "MEDIA"
bucket_name = "weave-steps-media-e2e"

# --- Staging (deployed from the `development` branch).
[env.staging]
name = "weave-steps-staging"

# Custom domain: serve staging at staging.weavesteps.com. `custom_domain = true`
# makes Wrangler provision the DNS record + edge cert on deploy (the weavesteps.com
# zone must already exist in this Cloudflare account). The *.workers.dev URL keeps
# working alongside it.
[[env.staging.routes]]
pattern = "staging.weavesteps.com"
custom_domain = true

[env.staging.assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Bindings are NOT inherited by named environments — redeclare per env.
# database_id binds the D1 instance (name is only a label); this id is the
# existing staging index, so the renamed worker keeps its staging data.
[[env.staging.d1_databases]]
binding = "DB"
database_name = "weave-steps-staging"
database_id = "ad9ea4d2-3687-411d-a664-a938dc91b541"
migrations_dir = "migrations"

[[env.staging.durable_objects.bindings]]
name = "DOC_DO"
class_name = "DocDO"

# Media R2 bucket (created 2026-07-19 — see PROVISIONING.md). Bindings are NOT
# inherited by named environments, so it is redeclared here.
[[env.staging.r2_buckets]]
binding = "MEDIA"
bucket_name = "weave-steps-media-staging"

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "weave_steps_staging"

# D30 ⟳ self-healing catalog: opt-in per deployed env (unit tests + e2e have no
# var, so nothing implicitly seeds 260+ DOs under a test harness).
#
# AI_GATEWAY_ID routes the Workers AI calls through AI Gateway (logging /
# rate-limiting / cost / accept-rate telemetry). It is a VAR, not a binding, so a
# missing gateway can't break a deploy — create it in the dashboard (AI Gateway →
# "weave-steps") before the first deploy exercises the real seam.
[env.staging.vars]
SELF_SEED = "1"
AI_GATEWAY_ID = "weave-steps"

# AI voice notes (docs/ideas/ai-voice-notes.md; docs/TOOLING.md § AI voice notes):
# Workers AI (STT fallback + extraction). Declared ONLY on the deployed envs —
# bindings are NOT inherited, so the default (dev + vitest-pool-workers) and
# [env.e2e] configs stay AI-free + secret-free, and voiceAiFor selects the
# deterministic fixture there structurally (zero-secret test matrix holds).
[env.staging.ai]
binding = "AI"

# --- Production (deployed from the `main` branch).
[env.production]
name = "weave-steps-production"

# Custom domain: serve production at the apex weavesteps.com. `custom_domain = true`
# makes Wrangler provision the DNS record + edge cert on deploy (the weavesteps.com
# zone must already exist in this Cloudflare account). The *.workers.dev URL keeps
# working alongside it.
[[env.production.routes]]
pattern = "weavesteps.com"
custom_domain = true

[env.production.assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# database_id binds the D1 instance (name is only a label); this id is the
# existing production index.
[env.production.vars]
SELF_SEED = "1"
AI_GATEWAY_ID = "weave-steps"

# AI voice notes — Workers AI, deployed envs only (see the staging block above).
[env.production.ai]
binding = "AI"

[[env.production.d1_databases]]
binding = "DB"
database_name = "weave-steps-production"
database_id = "55ba153e-a24e-4cf6-8579-213b236abae5"
migrations_dir = "migrations"

[[env.production.durable_objects.bindings]]
name = "DOC_DO"
class_name = "DocDO"

# Media R2 bucket (created 2026-07-19 — see PROVISIONING.md). Bindings are NOT
# inherited by named environments, so it is redeclared here.
[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "weave-steps-media-production"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "weave_steps_production"
